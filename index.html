<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Stella ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:Inter,sans-serif;
background:#0b0b0b;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
overflow:hidden;
}

/* Ambient glow */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at center, rgba(255,90,150,0.18), transparent 60%),
radial-gradient(circle at 20% 80%, rgba(255,140,200,0.12), transparent 60%);
z-index:-1;
animation:glow 8s ease-in-out infinite;
}

@keyframes glow{
0%,100%{opacity:.6}
50%{opacity:1}
}

.container{
max-width:600px;
padding:40px 28px;
text-align:center;
}

/* Name */
.name{
font-family:"Playfair Display",serif;
font-size:44px;
margin-bottom:18px;
letter-spacing:1px;
color:#ffd6e8;
}

/* Subtle intro */
.intro{
font-size:14px;
letter-spacing:3px;
text-transform:uppercase;
color:#aaa;
margin-bottom:30px;
}

/* Message */
.message{
font-size:20px;
line-height:1.8;
color:#ddd;
margin-bottom:50px;
}

/* Button */
.btn{
display:inline-block;
padding:18px 46px;
border-radius:50px;
background:linear-gradient(135deg,#ff5fa8,#ff9bd1);
color:#fff;
font-size:18px;
font-weight:600;
text-decoration:none;
box-shadow:0 18px 50px rgba(255,80,150,0.35);
transition:.25s ease;
}

.btn:hover{
transform:scale(1.06);
box-shadow:0 25px 70px rgba(255,100,170,0.45);
}

/* Signature */
.signature{
margin-top:70px;
font-size:13px;
letter-spacing:2px;
color:#888;
}

.signature span{
color:#ff9bd1;
}

/* Subtle fade in */
.container{
animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

</style>
</head>

<body>

<div class="container">

<div class="intro">11 April 2026…</div>

<div class="name">
Stella Aaliyah Dinar ❤️
</div>

<div class="message">

I could’ve said this in a normal way…  
but you’re not normal to me.

<br><br>

So I’m choosing you properly.

<br><br>

Will you be my girlfriend?

</div>

<a class="btn" href="https://wa.me/263779388560?text=Ray…%20yes%20❤️%20I’d%20love%20to%20be%20your%20girlfriend%20🥺✨">

YES ❤️

</a>

<div class="signature">

— <span>Rayblack.he.is</span>

</div>

</div>

</body>
</html>
